<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Descubra Novas Possibilidades</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0f0f0f;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    max-width:500px;
    width:90%;
    text-align:center;
    padding:20px;
}

h1{
    font-size:38px;
    font-weight:700;
    line-height:1.2;
    margin-bottom:15px;
}

.sub{
    font-size:17px;
    color:#d6d6d6;
    line-height:1.6;
    margin-bottom:25px;
}

.banner{
    width:100%;
    border-radius:16px;
    box-shadow:0 0 25px rgba(255,0,0,0.35);
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:18px 50px;
    text-decoration:none;
    color:#fff;
    font-size:20px;
    font-weight:700;
    border-radius:50px;
    background:linear-gradient(135deg,#d40000,#ff2d2d);
    box-shadow:0 0 20px rgba(255,0,0,.7);
    transition:all .3s ease;
    animation:pulse 1.8s infinite;
}

.btn:hover{
    transform:translateY(-3px) scale(1.03);
}

@keyframes pulse{
    0%{
        box-shadow:0 0 10px rgba(255,0,0,.5);
    }
    50%{
        box-shadow:0 0 30px rgba(255,0,0,1);
    }
    100%{
        box-shadow:0 0 10px rgba(255,0,0,.5);
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>Descubra Novas Possibilidades</h1>

    <p class="sub">
        Registe-se gratuitamente e tenha acesso imediato a uma experiência moderna, rápida e intuitiva.
    </p>

    <img class="banner" src="https://i.postimg.cc/Dyrtmr8W/IMG-20260606-WA0074-3.jpg" alt="Imagem Promocional">

    <a href="https://media1.placard.co.mz/redirect.aspx?pid=2366&bid=1690" class="btn">
        CRIAR CONTA
    </a>

</div>

</body>
</html>
